<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beacon — Your investments, unified</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=EB+Garamond:ital,wght@0,500;1,500&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#fafafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b12" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="Beacon — the portfolio dashboard for investors who own more than one brokerage. Holdings, dividends, and allocation across Robinhood, Vanguard, Coinbase, and 20+ more."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      // Apply theme BEFORE React mounts — prevents flash-of-wrong-theme.
      (function () {
        try {
          var s = localStorage.getItem("beacon.theme") || "light";
          var resolved =
            s === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : s;
          document.documentElement.classList.toggle("dark", resolved === "dark");
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          // fall through to light (no class added)
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
