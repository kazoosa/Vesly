# Koyeb deployment manifest for the backend service.
# See README → "Free cloud deploy" for the step-by-step wiring.
# Koyeb's UI reads this when you pick "Deploy from repository".
name: all-account-stocks-backend
services:
  - name: backend
    type: web
    # Build using our existing Dockerfile (resolves from the monorepo root)
    git:
      repository: REPLACE_WITH_YOUR_GITHUB_REPO # e.g. github.com/<you>/all-account-stocks
      branch: main
      build_command: ""  # Dockerfile handles everything
      run_command: ""    # Entrypoint from Dockerfile
      buildpack: null
    # Path to the Dockerfile relative to repo root
    dockerfile: apps/backend/Dockerfile
    # Free tier
    instance_type: free
    regions:
      - was   # Washington, US. Use `fra` for EU, `sin` for Asia.
    scaling:
      min: 0     # scale to zero when idle (saves free-tier hours)
      max: 1
    ports:
      - port: 3001
        protocol: http
    routes:
      - path: /
        port: 3001
    health_checks:
      - http:
          path: /health
          port: 3001
        grace_period: 30s
        interval: 30s
        timeout: 10s
    # Environment variables — set the values in Koyeb's UI as SECRETS, not here.
    # These are listed so you know what to add:
    env:
      - name: NODE_ENV
        value: production
      - name: ENVIRONMENT
        value: production
      - name: PORT
        value: "3001"
      - name: DATABASE_URL
        value: "@DATABASE_URL"
      - name: REDIS_URL
        value: "@REDIS_URL"
      - name: JWT_SECRET
        value: "@JWT_SECRET"
      - name: LINK_TOKEN_SECRET
        value: "@LINK_TOKEN_SECRET"
      - name: WEBHOOK_SIGNING_SECRET
        value: "@WEBHOOK_SIGNING_SECRET"
      - name: CORS_ORIGINS
        value: "@CORS_ORIGINS"
      - name: DASHBOARD_URL
        value: "@DASHBOARD_URL"
      - name: LINK_UI_URL
        value: "@LINK_UI_URL"
      - name: SNAPTRADE_CLIENT_ID
        value: "@SNAPTRADE_CLIENT_ID"
      - name: SNAPTRADE_CONSUMER_KEY
        value: "@SNAPTRADE_CONSUMER_KEY"
      - name: SNAPTRADE_WEBHOOK_SECRET
        value: "@SNAPTRADE_WEBHOOK_SECRET"
