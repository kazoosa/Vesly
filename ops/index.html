<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Beacon Ops — Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply theme before React mounts to avoid flash-of-wrong-theme.
      // Five themes; "beacon-ops-theme" is the new key, "beacon_ops_theme"
      // is the legacy binary one we still honour as a migration.
      (function () {
        var KNOWN = ["light", "dark", "midnight", "solarized", "high-contrast"];
        try {
          var s = localStorage.getItem("beacon-ops-theme");
          if (KNOWN.indexOf(s) === -1) {
            var legacy = localStorage.getItem("beacon_ops_theme");
            s =
              legacy === "dark"
                ? "dark"
                : legacy === "light"
                  ? "light"
                  : window.matchMedia("(prefers-color-scheme: dark)").matches
                    ? "dark"
                    : "light";
          }
          var html = document.documentElement;
          html.setAttribute("data-theme", s);
          if (s === "dark" || s === "midnight") html.classList.add("dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
